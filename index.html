<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Dark_eio | Dynamic</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0f0c29; }
        body {
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top right, #24243e, #0f0c29);
            font-family: 'Poppins', sans-serif; overflow: hidden;
        }

        /* Dynamic Glass Card */
        .contact-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px; width: 90%; max-width: 400px;
            text-align: center; color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .contact-card:hover { transform: translateY(-10px); border-color: var(--primary); }

        h2 { color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        .input-group { position: relative; margin-bottom: 20px; }

        input, textarea {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 12px;
            color: white; outline: none; transition: 0.3s; box-sizing: border-box;
        }

        input:focus, textarea:focus { 
            background: rgba(255,255,255,0.1); border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        /* Dynamic Button */
        .glow-btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white; font-weight: bold; cursor: pointer;
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .glow-btn:active { transform: scale(0.95); }

        /* Floating Circles for Dynamic Look */
        .circle {
            position: absolute; background: var(--primary); border-radius: 50%;
            filter: blur(50px); z-index: -1; opacity: 0.2;
        }
    </style>
</head>
<body>

    <div class="circle" style="width: 200px; height: 200px; top: 10%; left: 10%;"></div>
    <div class="circle" style="width: 300px; height: 300px; bottom: 10%; right: 10%; background: #3a7bd5;"></div>

    <section class="contact-card">
        <h2>Talk to Me</h2>
        <p style="opacity: 0.6; font-size: 13px;">Messages go straight to my inbox</p>

        <form id="contactForm" action="https://formspree.io/f/mzdyedpv" method="POST">
            
            <input type="text" name="_gotcha" style="display:none">

            <input type="hidden" name="_next" value="https://your-github-username.github.io/thanks.html">

            <div class="input-group">
                <input type="text" name="name" placeholder="Full Name" required>
            </div>

            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>

            <div class="input-group">
                <textarea name="message" rows="4" placeholder="Your Message..." required></textarea>
            </div>

            <button type="submit" class="glow-btn" id="submitBtn">Send Message</button>
        </form>
    </section>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');

        form.onsubmit = () => {
            btn.innerText = "Sending...";
            btn.style.opacity = "0.7";
        };
    </script>
</body>
</html>
